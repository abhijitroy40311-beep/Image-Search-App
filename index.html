<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelSearch</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>

    <header>

        <div class="logo">
            Pixel<span>Search</span>
        </div>

        <button class="login-btn" onclick="portfolio()">
            About Developer
        </button>

    </header>

    <section class="hero">

        <h1>
            Discover Stunning Images
        </h1>

        <p>
            Search millions of free high-quality photos instantly.
        </p>

        <div class="search-box">

            <input type="text" id="searchInput" placeholder="Search nature, cars, animals...">

            <button id="searchBtn">
                Search
            </button>

        </div>

    </section>

    <section id="gallery">

        <!-- Images here -->

    </section>

    <button id="loadMore">
        Load More
    </button>

    <script src="script.js"></script>

</body>

</html>
